<div class="p-8">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h3 class="text-2xl font-black text-slate-900 tracking-tight">{{ title }}</h3>
            <p class="text-sm font-medium text-slate-500">Organize drugs into logical groupings.</p>
        </div>
        <div class="w-12 h-12 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-400">
            <i data-lucide="tag" class="w-6 h-6"></i>
        </div>
    </div>

    <form
        hx-post="{% if category %}{% url 'drugs:category_update' category.id %}{% else %}{% url 'drugs:category_create' %}{% endif %}"
        hx-target="#modal-content" class="space-y-6">
        {% csrf_token %}

        <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Category Name</label>
            {{ form.name }}
        </div>

        <div class="space-y-2">
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest px-1">Description</label>
            {{ form.description }}
        </div>

        <div class="flex items-center justify-end space-x-3 pt-4">
            <button type="button" onclick="closeModal()"
                class="px-6 py-3 bg-slate-100 text-slate-600 rounded-xl text-sm font-black uppercase tracking-widest hover:bg-slate-200 transition-all">
                Cancel
            </button>
            <button type="submit"
                class="px-8 py-3 bg-accent-600 text-white rounded-xl text-sm font-black uppercase tracking-widest hover:bg-accent-700 shadow-lg shadow-accent-600/20 transition-all">
                {% if category %}Update Category{% else %}Create Category{% endif %}
            </button>
        </div>
    </form>
</div>

<script>
    lucide.createIcons();
</script>
