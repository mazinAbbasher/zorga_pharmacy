<div class="p-8">
    <div class="flex items-center justify-between mb-6">
        <div class="w-12 h-12 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center">
            <i data-lucide="trash-2" class="w-6 h-6"></i>
        </div>
        <button onclick="closeModal()"
            class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-xl transition-all">
            <i data-lucide="x" class="w-6 h-6"></i>
        </button>
    </div>

    <div class="space-y-2 mb-8">
        <h3 class="text-2xl font-black text-slate-800">Confirm Deletion</h3>
        <p class="text-slate-500 font-medium">
            Are you sure you want to delete <span class="text-slate-900 font-bold">"{{ drug.trade_name }}"</span>?
            This action will remove all records of this product from the inventory and cannot be undone.
        </p>
    </div>

    <form hx-post="{% url 'drugs:delete' drug.pk %}" hx-target="#modal-content" class="flex items-center space-x-3">
        {% csrf_token %}
        <button type="button" onclick="closeModal()"
            class="flex-1 px-6 py-4 bg-slate-100 hover:bg-slate-200 text-slate-600 text-sm font-bold rounded-2xl transition-all">
            Keep Product
        </button>
        <button type="submit"
            class="flex-1 px-6 py-4 bg-red-600 hover:bg-red-700 text-white text-sm font-bold rounded-2xl transition-all shadow-lg shadow-red-600/20 active:scale-95">
            Yes, Delete
        </button>
    </form>
</div>

<script>
    lucide.createIcons();
</script>
