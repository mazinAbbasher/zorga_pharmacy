{% for sale in transactions %}
<tr class="group hover:bg-slate-50/50 transition-all duration-200">
    <td class="px-8 py-5">
        <span class="font-bold text-slate-900">#SAL-{{ sale.id|stringformat:"05d" }}</span>
    </td>
    <td class="px-6 py-5">
        <div class="flex items-center space-x-3">
            <div
                class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-slate-400 group-hover:bg-accent-50 group-hover:text-accent-600 transition-colors">
                <i data-lucide="user" class="w-4 h-4"></i>
            </div>
            <span class="text-sm font-bold text-slate-700">{{ sale.customer.name|default:"Walk-in Customer" }}</span>
        </div>
    </td>
    <td class="px-6 py-5 text-sm text-slate-500 font-medium">
        {{ sale.timestamp|date:"M d, Y • H:i" }}
    </td>
    <td class="px-6 py-5 text-right">
        <span class="text-sm font-black text-slate-900">SDG {{ sale.final_amount|floatformat:0|intcomma }}</span>
    </td>
    <td class="px-6 py-5">
        <span
            class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider {% if sale.payment_method == 'CASH' %}bg-green-50 text-green-700 border border-green-100{% elif sale.payment_method == 'BANK_TRANSFER' %}bg-blue-50 text-blue-700 border border-blue-100{% else %}bg-orange-50 text-orange-700 border border-orange-100{% endif %}">
            {{ sale.get_payment_method_display }}
        </span>
    </td>
    <td class="px-8 py-5 text-right font-medium">
        <button hx-get="{% url 'transactions:sale_detail' sale.id %}" hx-target="#modal-content"
            class="text-accent-600 hover:text-accent-700 font-bold text-sm">
            View Details
        </button>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="6" class="px-8 py-12 text-center text-slate-400 font-medium">
        No sales found.
    </td>
</tr>
{% endfor %}

<script>
    lucide.createIcons();
</script>
