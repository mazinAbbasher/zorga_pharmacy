{% extends "base.html" %}

{% block content %}
<div class="space-y-8 animate-in fade-in duration-500">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
        <div>
            <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-2">Transactions History</h1>
            <p class="text-slate-500 font-medium">Audit and manage all sales and purchase activities.</p>
        </div>
        <!-- <div class="flex items-center space-x-3 bg-white p-2 rounded-[2rem] shadow-sm border border-slate-100">
            <a href="?type=sales"
                class="px-6 py-3 rounded-2xl text-sm font-black uppercase tracking-widest transition-all {% if type == 'sales' %}bg-accent-600 text-white shadow-lg shadow-accent-600/20{% else %}text-slate-400 hover:text-slate-900 hover:bg-slate-50{% endif %}">
                Sales
            </a> -->
            <!-- <a href="?type=purchases"
                class="px-6 py-3 rounded-2xl text-sm font-black uppercase tracking-widest transition-all {% if type == 'purchases' %}bg-accent-600 text-white shadow-lg shadow-accent-600/20{% else %}text-slate-400 hover:text-slate-900 hover:bg-slate-50{% endif %}">
                Purchases
            </a> -->
        </div>
    </div>

    <!-- Stats Row (Optional, could add later) -->

    <!-- Main Content Card -->
    <div class="bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
        <!-- Search & Filter Bar -->
        <div class="p-8 border-b border-slate-100 bg-slate-50/30">
            <div class="relative max-w-md">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i>
                <input type="text" name="q" value="{{ query }}" hx-get="{% url 'transactions:list' %}"
                    hx-trigger="keyup changed delay:500ms" hx-target="#transaction-table-body"
                    hx-include="[name='type']" placeholder="Search by ID, Customer, or Invoice..."
                    class="w-full pl-12 pr-6 py-4 bg-white border border-slate-200 rounded-2xl text-sm font-medium focus:outline-none focus:ring-4 focus:ring-accent-500/10 focus:border-accent-500 transition-all shadow-sm">
                <input type="hidden" name="type" value="{{ type }}">
            </div>
        </div>

        <!-- Table -->
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr
                        class="bg-slate-50/50 border-b border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">
                        <th class="px-8 py-5">Transaction ID</th>
                        <th class="px-6 py-5">Customer</th>
                        <th class="px-6 py-5">Time/Date</th>
                        <th class="px-6 py-5 text-right">Amount</th>
                        <th class="px-6 py-5">Method</th>
                        <th class="px-8 py-5 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="transaction-table-body" class="divide-y divide-slate-100">
                    {% include "transactions/partials/sale_rows.html" %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
