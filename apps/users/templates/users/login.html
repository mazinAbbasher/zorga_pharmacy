{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pharmacy Management</title>
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>

<body class="bg-slate-100 h-screen flex items-center justify-center font-sans antialiased">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        <div class="bg-primary p-8 text-white text-center">
            <h1 class="text-3xl font-bold">Pharmacy POS</h1>
            <p class="text-slate-400 mt-2">Sign in to your account</p>
        </div>
        <div class="p-8">
            <form method="post">
                {% csrf_token %}
                <div class="space-y-6">
                    <div>
                        <label for="id_username"
                            class="block text-sm font-semibold text-slate-700 mb-2">Username</label>
                        <input type="text" name="username" id="id_username" required class="input"
                            placeholder="Enter your username">
                    </div>
                    <div>
                        <label for="id_password"
                            class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                        <input type="password" name="password" id="id_password" required class="input"
                            placeholder="••••••••">
                    </div>
                    {% if form.errors %}
                    <div class="p-3 bg-red-50 text-red-700 text-sm rounded-lg border border-red-200">
                        Invalid username or password.
                    </div>
                    {% endif %}
                    <button type="submit" class="w-full btn btn-primary py-3 text-lg">
                        Login
                    </button>
                    <div class="text-center">
                        <p class="text-sm text-slate-500">
                            Fully Offline Management System
                        </p>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
