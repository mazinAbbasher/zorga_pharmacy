<div class="bg-primary-950 rounded-2xl p-5 shadow-xl relative overflow-hidden border border-white/5 group">
    <!-- Glow -->
    <div class="absolute -top-16 -right-16 w-40 h-40 bg-accent-600/30 rounded-full blur-[60px]"></div>

    <div class="space-y-2.5 relative z-10">
        <div class="flex justify-between items-center text-slate-400">
            <span class="text-[10px] font-black uppercase tracking-[0.25em]">Sub-Total</span>
            <div class="flex items-baseline gap-1">
                <span class="text-[10px] font-black text-slate-500">SDG</span>
                <span class="font-black text-white text-lg tracking-tight" id="subtotal-val"
                    data-subtotal="{{ subtotal }}">{{ subtotal|floatformat:0|intcomma }}</span>
            </div>
        </div>

        <div class="flex justify-between items-center text-red-500">
            <span class="text-[10px] font-black uppercase tracking-[0.25em]">Discount</span>
            <div class="flex items-baseline gap-1">
                <span class="text-[10px] font-black text-red-600/50">SDG</span>
                <span class="font-black text-lg tracking-tight" id="discount-display">0</span>
            </div>
        </div>

        <div class="pt-3 border-t border-white/10 flex items-end justify-between">
            <span class="text-[10px] font-black text-accent-400 uppercase tracking-[0.25em]">Total Due</span>
            <div class="text-3xl font-black text-white tracking-tight leading-none" id="final-total-display">
                SDG {{ subtotal|floatformat:0|intcomma }}
            </div>
        </div>
    </div>

    <!-- Finalize Button -->
    <button type="submit" id="checkout-btn"
        class="w-full mt-4 py-3.5 bg-accent-600 hover:bg-accent-500 text-white rounded-xl shadow-lg shadow-accent-600/30 transition-all active:scale-[0.97] flex items-center justify-center gap-2 disabled:opacity-30 disabled:cursor-not-allowed disabled:grayscale disabled:shadow-none relative z-10"
        {% if not cart_items or subtotal == 0 %}disabled{% endif %}>
        <span class="text-sm font-black uppercase tracking-[0.25em]">Finalize Sale</span>
        <i data-lucide="arrow-right" class="w-5 h-5"></i>
    </button>
</div>
