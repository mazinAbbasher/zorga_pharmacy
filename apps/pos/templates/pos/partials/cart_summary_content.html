<div class="px-6 py-5 bg-slate-50/60 border-t border-slate-100">
    <!-- Subtotal -->
    <div class="flex items-center justify-between py-1.5">
        <span class="text-sm font-semibold text-slate-500">Subtotal</span>
        <span class="text-sm font-bold text-slate-700">
            SDG <span id="subtotal-val" data-subtotal="{{ subtotal }}">{{ subtotal|floatformat:0 }}</span>
        </span>
    </div>

    <!-- Discount -->
    <div class="flex items-center justify-between py-1.5">
        <span class="text-sm font-semibold text-slate-500">Discount</span>
        <span class="text-sm font-bold text-red-600" id="discount-display">−SDG 0</span>
    </div>

    <!-- Total -->
    <div class="flex items-end justify-between mt-3 pt-4 border-t border-slate-200">
        <div>
            <span class="text-xs font-bold text-slate-400 uppercase tracking-wide">Total Due</span>
            <p class="text-[11px] text-slate-400 font-medium mt-0.5">VAT included (0%)</p>
        </div>
        <span class="text-3xl font-extrabold text-slate-900 tracking-tight leading-none" id="final-total-display">
            SDG {{ subtotal|floatformat:0 }}
        </span>
    </div>

    <!-- Charge button -->
    <button type="submit" id="checkout-btn"
        class="w-full mt-5 py-4 bg-accent-600 hover:bg-accent-700 text-white rounded-2xl shadow-lg shadow-accent-600/25 transition-all active:scale-[0.98] flex items-center justify-center gap-3 disabled:opacity-40 disabled:cursor-not-allowed disabled:shadow-none"
        {% if not cart_items or subtotal == 0 %}disabled{% endif %}>
        <i data-lucide="circle-check-big" class="w-5 h-5"></i>
        <span class="text-base font-extrabold tracking-wide">Charge</span>
        <span class="text-base font-extrabold tracking-wide" id="checkout-amount">SDG {{ subtotal|floatformat:0 }}</span>
    </button>
</div>
