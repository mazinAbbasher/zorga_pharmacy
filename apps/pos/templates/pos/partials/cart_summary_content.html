<div class="bg-primary-950 rounded-[2.5rem] p-10 shadow-2xl relative overflow-hidden border border-white/5 group">
    <!-- Animated Glow Effect -->
    <div
        class="absolute -top-24 -right-24 w-64 h-64 bg-accent-600/30 rounded-full blur-[80px] group-hover:bg-accent-500/40 transition-all duration-1000">
    </div>
    <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-primary-600/20 rounded-full blur-[80px]"></div>

    <div class="space-y-6 relative z-10">
        <div class="flex justify-between items-center text-slate-400">
            <span class="text-[10px] font-black uppercase tracking-[0.4em] ml-1">Sub-Total</span>
            <div class="flex items-baseline space-x-1">
                <span class="text-xs font-black text-slate-500">SDG</span>
                <span class="font-black text-white text-2xl tracking-tight" id="subtotal-val"
                    data-subtotal="{{ subtotal }}">
                    {{ subtotal|floatformat:0 }}
                </span>
            </div>
        </div>

        <div class="flex justify-between items-center text-red-500">
            <span class="text-[10px] font-black uppercase tracking-[0.4em] ml-1">Discount</span>
            <div class="flex items-baseline space-x-1">
                <span class="text-xs font-black text-red-600/50">SDG</span>
                <span class="font-black text-2xl tracking-tight" id="discount-display">0</span>
            </div>
        </div>

        <div class="pt-8 border-t border-white/10 mt-4">
            <div class="flex justify-between items-start">
                <div>
                    <span class="text-[11px] font-black text-accent-400 uppercase tracking-[0.4em] ml-1">Total
                        Due</span>
                    <div class="flex items-center space-x-2 mt-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                        <span class="text-[8px] text-slate-500 font-black uppercase tracking-widest">Live Sync
                            Enabled</span>
                    </div>
                </div>
                <div class="text-right">
                    <div class="text-5xl font-black text-white tracking-tighter" id="final-total-display">
                        SDG {{ subtotal|floatformat:0 }}
                    </div>
                    <div class="text-[9px] text-slate-500 font-black uppercase tracking-widest mt-2">Vat & Taxes
                        Included (0%)</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Finalize Button -->
    <button type="submit" id="checkout-btn"
        class="w-full mt-10 py-6 bg-accent-600 hover:bg-accent-500 text-white rounded-3xl shadow-[0_20px_50px_rgba(37,99,235,0.3)] hover:shadow-[0_20px_50px_rgba(37,99,235,0.5)] transition-all active:scale-[0.97] flex items-center justify-center group/finish disabled:opacity-30 disabled:cursor-not-allowed disabled:grayscale disabled:shadow-none overflow-hidden relative"
        {% if not cart_items or subtotal == 0 %}disabled{% endif %}>

        <div
            class="absolute inset-0 bg-gradient-to-r from-accent-600 to-accent-400 opacity-0 group-hover/finish:opacity-100 transition-opacity">
        </div>

        <div class="relative z-10 flex items-center">
            <span class="text-xl font-black uppercase tracking-[0.4em]">Finalize Sale</span>
            <div
                class="ml-4 w-10 h-10 rounded-2xl bg-white/20 flex items-center justify-center group-hover/finish:translate-x-2 transition-transform duration-500">
                <i data-lucide="arrow-right" class="w-6 h-6"></i>
            </div>
        </div>
    </button>
</div>
