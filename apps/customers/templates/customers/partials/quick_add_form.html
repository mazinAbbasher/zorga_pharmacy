<div class="p-6">
    <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold text-slate-800">Quick Add Customer</h3>
        <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    <form hx-post="{% url 'customers:quick_add_modal' %}" hx-target="#modal-content" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Customer Name</label>
            {{ form.name }}
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Phone Number</label>
            {{ form.phone_number }}
        </div>
        <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1">Address</label>
            {{ form.address }}
        </div>

        <div class="flex space-x-3 pt-4">
            <button type="button" onclick="closeModal()"
                class="flex-1 btn bg-slate-100 text-slate-700 hover:bg-slate-200">Cancel</button>
            <button type="submit" class="flex-1 btn btn-primary">Save Customer</button>
        </div>
    </form>
</div>
